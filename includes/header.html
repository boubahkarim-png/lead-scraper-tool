<script>
(function() {
  // Detect current language from URL
  var path = window.location.pathname;
  var isEnglish = path.indexOf('/en/') !== -1;
  var currentLang = isEnglish ? 'en' : 'fr';
  
  // Apply language on load
  applyLanguage(currentLang);
  
  // Setup language switcher clicks
  var langLinks = document.querySelectorAll('.lang-link');
  langLinks.forEach(function(link) {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      var targetLang = this.getAttribute('data-lang');
      if (targetLang === currentLang) return;
      switchLanguage(targetLang);
    });
  });
  
  // Mobile menu toggle
  var mobileBtn = document.getElementById('mobileMenuToggle');
  var mobileMenu = document.getElementById('mobileMenu');
  if (mobileBtn && mobileMenu) {
    mobileBtn.onclick = function() {
      mobileMenu.style.display = mobileMenu.style.display === 'block' ? 'none' : 'block';
    };
  }
})();

function applyLanguage(lang) {
  // Show/hide language-specific elements
  var frElements = document.querySelectorAll('[data-lang="fr"]');
  var enElements = document.querySelectorAll('[data-lang="en"]');
  
  frElements.forEach(function(el) {
    el.style.display = lang === 'fr' ? 'inline' : 'none';
  });
  enElements.forEach(function(el) {
    el.style.display = lang === 'en' ? 'inline' : 'none';
  });
  
  // Update language selector styling
  var langLinks = document.querySelectorAll('.lang-link');
  langLinks.forEach(function(link) {
    var linkLang = link.getAttribute('data-lang');
    if (linkLang === lang) {
      link.style.background = '#0ea5e9';
      link.style.color = '#fff';
    } else {
      link.style.background = 'transparent';
      link.style.color = linkLang === 'fr' ? '#333' : '#666';
    }
  });
}

function switchLanguage(lang) {
  var path = window.location.pathname;
  var isEnglish = path.indexOf('/en/') !== -1;
  var isFrench = path.indexOf('/fr/') !== -1;
  
  // Get current filename
  var parts = path.split('/');
  var filename = parts[parts.length - 1] || 'index.html';
  
  // Build new path
  var newPath;
  if (lang === 'en') {
    if (isFrench) {
      newPath = path.replace('/fr/', '/en/');
    } else {
      newPath = '/en/' + filename;
    }
  } else {
    if (isEnglish) {
      newPath = path.replace('/en/', '/fr/');
    } else {
      newPath = '/fr/' + filename;
    }
  }
  
  // Handle GitHub Pages repo path
  if (window.location.hostname.indexOf('github.io') !== -1) {
    var pathParts = path.split('/').filter(Boolean);
    if (pathParts.length > 0 && pathParts[0] !== 'fr' && pathParts[0] !== 'en') {
      var repo = pathParts[0];
      if (lang === 'en') {
        newPath = isFrench ? path.replace('/fr/', '/en/') : '/' + repo + '/en/' + filename;
      } else {
        newPath = isEnglish ? path.replace('/en/', '/fr/') : '/' + repo + '/fr/' + filename;
      }
    }
  }
  
  window.location.href = newPath;
}
</script>
